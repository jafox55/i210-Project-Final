<!doctype html>
<!--
  Contact page layout:
  - Shared navigation
  - Contact form
  - Redirects to thankyou.html after submit
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | The Game Archive</title>
    <link rel="icon" href="images/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- Shared top navigation -->
    <nav>
      <div class="logo-container">
        <img src="images/logo.svg" alt="The Game Archive Logo" class="logo" />
        <span class="logo-text">The Game Archive</span>
      </div>

      <div class="links">
        <a href="index.html">Home</a>
        <a href="games.html">Catalog</a>
        <a href="search.html">Search Games</a>
        <a href="favorites.html">Favorites</a>
        <a href="contact.html" aria-current="page">Contact</a>
      </div>
    </nav>

    <!-- Contact form content -->
    <section class="section">
      <h2>Contact Us</h2>

      <!-- Basic contact form (GET) -->
      <form action="thankyou.html" method="GET">
        <input
          id="contact-name"
          name="name"
          type="text"
          placeholder="Name"
          autocomplete="name"
          aria-label="Name"
          required
        />
        <input
          id="contact-email"
          name="email"
          type="email"
          placeholder="Email"
          autocomplete="email"
          aria-label="Email"
          required
        />
        <textarea
          id="contact-message"
          name="message"
          placeholder="Message"
          aria-label="Message"
          required
        ></textarea>
        <button type="submit" class="btn">Send</button>
      </form>

      <!-- Supplemental helper text -->
      <p class="small">We will respond as soon as possible.</p>
    </section>
    <!-- Shared footer -->
    <footer>
      <p class="footer">Made by Caitlynn Faulkner, Jacob Fox, and Ben Fox</p>
    </footer>
  </body>
</html>
