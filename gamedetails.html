<!doctype html>
<!--
  Game details page layout:
  - Shared navigation
  - Back link controlled by gamedetails.js
  - Details panel content injected by JavaScript
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Details | The Game Archive</title>
    <link rel="icon" href="images/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- Shared top navigation -->
    <nav>
      <div class="logo-container">
        <img src="images/logo.svg" alt="The Game Archive Logo" class="logo" />
        <span class="logo-text">The Game Archive</span>
      </div>

      <div class="links">
        <a href="index.html">Home</a>
        <a href="games.html">Catalog</a>
        <a href="search.html">Search Games</a>
        <a href="favorites.html">Favorites</a>
        <a href="contact.html">Contact</a>
      </div>
    </nav>

    <!-- Page title -->
    <section class="catalog-section">
      <h2>Game Details</h2>
    </section>

    <!-- Dynamic game details target -->
    <section class="details-section">
      <a href="search.html" class="back">← Back</a>
      <div id="content"></div>
    </section>

    <!-- Shared footer -->
    <footer>
      <p class="footer">Made by Caitlynn Faulkner, Jacob Fox, and Ben Fox</p>
    </footer>

    <!-- Shared adult-mask toggle + details loading logic -->
    <script src="js/adult-toggle.js"></script>
    <script src="js/gamedetails.js"></script>
  </body>
</html>
