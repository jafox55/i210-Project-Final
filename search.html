<!doctype html>
<!--
  Search page layout:
  - Shared navigation
  - Search controls
  - Message area and result grid managed by search.js
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search Games | The Game Archive</title>
    <link rel="icon" href="images/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- Shared top navigation -->
    <nav>
      <div class="logo-container">
        <img src="images/logo.svg" alt="The Game Archive Logo" class="logo" />
        <span class="logo-text">The Game Archive</span>
      </div>

      <div class="links">
        <a href="index.html">Home</a>
        <a href="games.html">Catalog</a>
        <a href="search.html" aria-current="page">Search Games</a>
        <a href="favorites.html">Favorites</a>
        <a href="contact.html">Contact</a>
      </div>
    </nav>

    <!-- Search page heading -->
    <section class="catalog-section">
      <h2>Search Games</h2>
      <p>Find games by title, platform, or keyword.</p>
    </section>

    <!-- Search controls + dynamic results -->
    <section class="search-shell">
      <div class="bar">
        <div class="input-wrap">
          <input
            id="searchInput"
            type="text"
            placeholder="Search games (e.g. mario, playstation)"
          />
          <button id="clearButton" class="clear-btn" aria-label="Clear search">
            &#x2715;
          </button>
        </div>
        <button id="searchButton">Search</button>
      </div>
      <div id="message" class="msg hidden"></div>
      <div id="results"></div>
    </section>

    <!-- Shared footer -->
    <footer>
      <p class="footer">Made by Caitlynn Faulkner, Jacob Fox, and Ben Fox</p>
    </footer>
    <!-- Firebase SDKs used for favorites star state -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <!-- Shared adult-mask toggle + search logic -->
    <script src="js/adult-toggle.js"></script>
    <script src="js/search.js"></script>
  </body>
</html>
