<!doctype html>
<!--
  Catalog page layout:
  - Shared navigation
  - Catalog heading
  - Game grid container rendered by games.js
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catalog | The Game Archive</title>
    <link rel="icon" href="images/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Shared top navigation -->
    <nav>
      <div class="logo-container">
        <img src="images/logo.svg" alt="The Game Archive Logo" class="logo" />
        <span class="logo-text">The Game Archive</span>
      </div>

      <div class="links">
        <a href="index.html">Home</a>
        <a href="games.html" aria-current="page">Catalog</a>
        <a href="search.html">Search Games</a>
        <a href="favorites.html">Favorites</a>
        <a href="contact.html">Contact</a>
      </div>
    </nav>

    <!-- Page heading and short context text -->
    <section class="catalog-section">
      <h2>Game Catalog</h2>
      <p>Browse all archived entries.</p>
    </section>

    <!-- Game grid (API data is injected by games.js) -->
    <section class="catalog-grid catalog-shell">
      <div class="grid" id="gameContainer"></div>
    </section>
    <!-- Shared footer -->
    <footer>
      <p class="footer">Made by Caitlynn Faulkner, Jacob Fox, and Ben Fox</p>
    </footer>
    <!-- Firebase SDKs used for catalog favorite-star state -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <!-- Shared adult-mask toggle + catalog rendering logic -->
    <script src="js/adult-toggle.js"></script>
    <script src="js/games.js"></script>
  </body>
</html>
